<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a Student Registration Form Using HTML</title>
</head>
<body>
  
    
     <form>
        <fieldset>
    <h4>Personal Information</h4>
  
    <label for="fname">First Name:</label>
            <input type="text" name="fname" id="fname" required>

            <br><br>

             <label for="StudentId">Student id:</label>
            <input type="text" name="StudentId" id="StudentId" required>

                <br><br>

                 <label for="email">Email adress:</label>
            <input type="email" name="email" id="email" required>

                <br><br>
            

             <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone" required>

                <br><br>

             <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" required>
             <br><br>

<label for="gender"><b>Gender:</b></label><br>
            <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>

               


                 <br><br>
     <label for="Academic Informationt"><b>Academic Information:</b></label><br><br>
                 <label for="department"><b>Department:</b></label><br>

<select name="department" id="department">
    <option value="cse" selected>CSE</option>
    <option value="eee">EEE</option>
    <option value="bba">BBA</option>
    <option value="english">English</option>
    <option value="civil">Civil Engineering</option>
</select>
<br><br>

<label for="semester"><b>Semester:</b></label><br>

<select name="semester" id="semester">
    <option value="1st sem" >1st semester</option>
    <option value="2nd sem">2nd semester</option>
    <option value="3rd sem">3rd semester</option>
    <option value="4th sem">4th semester</option>
    <option value="5th sem">5th semester</option>
    <option value="6th sem">6th semester</option>
    <option value="7th sem">7th semester</option>
    <option value="8th sem">8th semester</option>

</select>

    <br><br>
     
<label for="semester"><b>Programming Languages Known:</b></label><br>
<input type="checkbox" id="c" name="language" value="C">
<label for="c">C</label><br>

<input type="checkbox" id="cpp" name="language" value="C++">
<label for="cpp">C++</label><br>

<input type="checkbox" id="java" name="language" value="Java">
<label for="java">Java</label><br>

<input type="checkbox" id="python" name="language" value="Python">
<label for="python">Python</label><br>

<input type="checkbox" id="javascript" name="language" value="JavaScript">
<label for="javascript">JavaScript</label>
<br><br>



    
    <h4>Additional Information</h4>

    <br><br>

<label for="address"> Address:</label><br>
<textarea id="address" name="address" rows="7" cols="30"></textarea>
<br><br>


<label for="photo"> Upload Student Photo:</label><br><br>
<input type="file" id="photo" name="photo">
<br><br>


<label for="comments"> Comments/Suggesaions:</label><br><br>
<textarea id="comments" name="comments" rows="4" cols="40"></textarea>
<br><br>



<input type="submit" value="Submit">
<input type="reset" value="Reset">



 </fieldset>






   </form>

</body>
</html>
